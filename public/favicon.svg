<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" fill="none">
  <!-- Cloud shape -->
  <path d="M16 34 C8 34 4 29 4 24 C4 19 8 15 13 15 C13.5 10 18 6 24 6 C29 6 33 9 34.5 13 C36 12 38 11 40 11 C46 11 50 15 50 20 C54 20 58 24 58 28 C58 32 54 34 50 34 Z" stroke="#00F5FF" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Circuit nodes inside cloud (outline only) -->
  <circle cx="22" cy="22" r="2" stroke="#00F5FF" stroke-width="1" fill="none"/>
  <circle cx="29" cy="22" r="1.5" stroke="#00F5FF" stroke-width="1" fill="none"/>
  <circle cx="36" cy="22" r="2" stroke="#00F5FF" stroke-width="1" fill="none"/>
  <circle cx="44" cy="22" r="2" stroke="#00F5FF" stroke-width="1" fill="none"/>
  <!-- Horizontal circuit lines (stop at circle edges) -->
  <line x1="24" y1="22" x2="27.5" y2="22" stroke="#00F5FF" stroke-width="1"/>
  <line x1="30.5" y1="22" x2="34" y2="22" stroke="#00F5FF" stroke-width="1"/>
  <line x1="38" y1="22" x2="42" y2="22" stroke="#00F5FF" stroke-width="1"/>
  <!-- Vertical from first node going up (line stops at circle edge) -->
  <line x1="22" y1="20" x2="22" y2="15.5" stroke="#00F5FF" stroke-width="1"/>
  <circle cx="22" cy="14" r="1.5" stroke="#00F5FF" stroke-width="0.75" fill="none"/>
  <!-- Vertical from last node going down (line stops at circle edges) -->
  <line x1="44" y1="24" x2="44" y2="28.5" stroke="#00F5FF" stroke-width="1"/>
  <circle cx="44" cy="30" r="1.5" stroke="#00F5FF" stroke-width="0.75" fill="none"/>
  <!-- Horizontal branch left from bottom of fourth node -->
  <line x1="42.5" y1="30" x2="37" y2="30" stroke="#00F5FF" stroke-width="0.75"/>
  <circle cx="35.5" cy="30" r="1.5" stroke="#00F5FF" stroke-width="0.75" fill="none"/>
  <!-- Vertical trace extending down from center node -->
  <line x1="29" y1="23.5" x2="29" y2="42" stroke="#00F5FF" stroke-width="1" opacity="0.6"/>
  <circle cx="29" cy="42" r="1.5" stroke="#00F5FF" stroke-width="0.75" fill="none" opacity="0.6"/>
  <!-- Horizontal branch from trace (lines stop at circle edges) -->
  <line x1="29" y1="38" x2="21" y2="38" stroke="#00F5FF" stroke-width="0.75" opacity="0.4"/>
  <circle cx="20" cy="38" r="1" stroke="#00F5FF" stroke-width="0.75" fill="none" opacity="0.4"/>
  <line x1="29" y1="38" x2="37" y2="38" stroke="#00F5FF" stroke-width="0.75" opacity="0.4"/>
  <circle cx="38" cy="38" r="1" stroke="#00F5FF" stroke-width="0.75" fill="none" opacity="0.4"/>
</svg>